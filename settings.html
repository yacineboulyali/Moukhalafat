<input class="w-full bg-surface-container-low border-none rounded-lg px-4 py-3 text-on-surface focus:ring-2 focus:ring-primary-container font-medium" type="text" value="Ahmed_AlMaghribi"/>

<button class="flex-1 py-3 px-4 rounded-lg bg-primary-fixed text-on-primary-fixed font-bold text-sm transition-colors">

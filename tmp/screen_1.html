<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .zellige-pattern {
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l15 15-15 15-15-15L30 0zm0 60l15-15-15-15-15 15 15 15zM0 30l15 15 15-15-15-15L0 30zm60 0l-15 15-15-15 15-15 15 15z' fill='%232c4e3e' fill-opacity='1'/%3E%3C/svg%3E");
      }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background font-body text-on-surface min-h-screen relative overflow-x-hidden">
<!-- Moroccan Zellige Accent (Top Right) -->
<div class="absolute top-0 right-0 w-48 h-48 zellige-pattern opacity-[0.06] -mr-12 -mt-12 pointer-events-none"></div>
<!-- Top Navigation (Based on TopAppBar Shared Component Logic) -->
<header class="flex justify-between items-center px-6 h-16 w-full fixed top-0 bg-background/80 backdrop-blur-md z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-primary transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="flex items-center gap-1.5">
<span class="w-2.5 h-2.5 rounded-full bg-secondary"></span>
<span class="w-2.5 h-2.5 rounded-full bg-secondary"></span>
<span class="w-2.5 h-2.5 rounded-full bg-secondary"></span>
<span class="w-2.5 h-2.5 rounded-full bg-outline-variant"></span>
</div>
<div class="flex items-center gap-2 px-3 py-1.5 bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-sm text-primary" data-icon="timer">timer</span>
<span class="text-xs font-bold font-label text-primary">01:45</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<!-- Situation Recap Card -->
<section class="bg-surface-container-lowest rounded-DEFAULT shadow-[0_8px_32px_rgba(28,28,24,0.04)] border-l-4 border-secondary p-4 mb-8">
<div class="flex items-center gap-4">
<div class="relative">
<img class="w-14 h-14 rounded-full object-cover border-2 border-surface-container" data-alt="Close-up portrait of Fatima Bennani, a professional Moroccan woman in an elegant blazer, warm expression, in a bright office environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCw1tuvhkepmXJC2rIaY00zhmZSPxcy0M9XykS_KfvY5-ITLdaW2VaTK6vToeu729cGOeOJDze__JcolK0Yf1UyDEQ_KD59uEXiId4jT0GImE8ZILnb95U0oZPPHDn309SbJFf0D5MqXf_STdFeoQTWopxZVHmobXg_274nFfJKPjNp2UK0nADunEa5eijhGriz_9N6ZLv1dMgeFwvAC61hzyorLYqFqzdXZbDRl5k72MUpfvex7lCkSRhJjwRYd73EBMjSKh6y-4M"/>
<div class="absolute -bottom-1 -right-1 w-5 h-5 bg-tertiary-fixed rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-on-tertiary-fixed font-bold" data-icon="chat">chat</span>
</div>
</div>
<div class="flex-1">
<h3 class="text-sm font-semibold font-headline leading-tight">Fatima vous demande de réagir</h3>
<p class="text-[12px] text-outline mt-0.5">مراكش — Bureau Atlas International</p>
</div>
<div class="bg-secondary-container/20 px-2.5 py-1 rounded-md self-start">
<span class="text-[10px] font-bold text-on-secondary-container flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]" data-icon="warning">warning</span>
                        SITUATION TENDUE
                    </span>
</div>
</div>
</section>
<!-- Choices Section -->
<div class="space-y-4">
<!-- Choice A -->
<button class="w-full text-left group bg-surface-container-lowest rounded-DEFAULT border-[1.5px] border-outline-variant/30 p-4 transition-all hover:border-primary active:scale-[0.98] focus:ring-2 focus:ring-primary focus:outline-none">
<div class="flex gap-4 items-start">
<div class="w-10 h-10 shrink-0 rounded-full bg-surface-container flex items-center justify-center font-headline font-bold text-primary group-hover:bg-primary group-hover:text-white transition-colors">
                        A
                    </div>
<div class="flex-1">
<p class="text-[15px] font-semibold text-on-surface leading-snug">J'interviens calmement pour recentrer la discussion</p>
<p class="text-[13px] text-outline mt-1 font-body" dir="rtl">أتدخل بهدوء لإعادة توجيه النقاش</p>
</div>
</div>
</button>
<!-- Choice B -->
<button class="w-full text-left group bg-surface-container-lowest rounded-DEFAULT border-[1.5px] border-outline-variant/30 p-4 transition-all hover:border-primary active:scale-[0.98] focus:ring-2 focus:ring-primary focus:outline-none">
<div class="flex gap-4 items-start">
<div class="w-10 h-10 shrink-0 rounded-full bg-surface-container flex items-center justify-center font-headline font-bold text-primary group-hover:bg-primary group-hover:text-white transition-colors">
                        B
                    </div>
<div class="flex-1">
<p class="text-[15px] font-semibold text-on-surface leading-snug">J'attends que la situation se calme d'elle-même</p>
<p class="text-[13px] text-outline mt-1 font-body" dir="rtl">أنتظر حتى يهدأ الوضع من تلقاء نفسه</p>
</div>
</div>
</button>
<!-- Choice C -->
<button class="w-full text-left group bg-surface-container-lowest rounded-DEFAULT border-[1.5px] border-outline-variant/30 p-4 transition-all hover:border-primary active:scale-[0.98] focus:ring-2 focus:ring-primary focus:outline-none">
<div class="flex gap-4 items-start">
<div class="w-10 h-10 shrink-0 rounded-full bg-surface-container flex items-center justify-center font-headline font-bold text-primary group-hover:bg-primary group-hover:text-white transition-colors">
                        C
                    </div>
<div class="flex-1">
<p class="text-[15px] font-semibold text-on-surface leading-snug">Je demande une pause et consulte Fatima en privé</p>
<p class="text-[13px] text-outline mt-1 font-body" dir="rtl">أطلب استراحة وأستشير فاطمة على انفراد</p>
</div>
</div>
</button>
</div>
</main>
<!-- Fixed Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-surface/80 backdrop-blur-md flex flex-col items-center gap-4">
<div class="text-center px-4">
<p class="text-[13px] text-on-surface-variant font-medium italic">
                🤔 Réfléchis bien — cette décision aura des conséquences
            </p>
<p class="text-[12px] text-outline mt-0.5" dir="rtl">فكر جيداً — سيكون لهذا القرار عواقب</p>
</div>
<button class="w-full max-w-xs bg-primary text-white py-4 px-8 rounded-xl font-headline font-bold text-base shadow-lg shadow-primary/20 flex items-center justify-center gap-3 transition-all active:scale-[0.97]">
            Valider mon choix
            <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
</body></html>
